name: CI

on:
  push:
    branches: [master, main, dev]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  commitlint:
    name: Lint Commit Messages
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install commitlint
        run: npm ci

      - name: Validate commits
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      go: ${{ steps.filter.outputs.go }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'sources/dev/authentication/**'
            frontend:
              - 'sources/dev/admin-dashboard/**'
            go:
              - 'sources/dev/authentication-go/**'

  backend-check:
    name: Backend Lint
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sources/dev/authentication
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: sources/dev/authentication

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

  backend-test:
    name: Backend Test
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sources/dev/authentication

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root_password
          MYSQL_DATABASE: auth_test
          MYSQL_USER: auth
          MYSQL_PASSWORD: auth_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uauth -pauth_password"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: sources/dev/authentication

      - name: Generate ephemeral JWT keys
        run: |
          mkdir -p keys
          openssl genpkey -algorithm RSA -out keys/private.pem -pkeyopt rsa_keygen_bits:2048
          openssl rsa -pubout -in keys/private.pem -out keys/public.pem

      - name: Run tests
        env:
          TEST_STORAGE_CONNECTION_STRING: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;TableEndpoint=http://127.0.0.1:10002/devstoreaccount1"
        run: cargo test --features test-providers -- --test-threads=1

  backend-docker:
    name: Backend Docker Build
    runs-on: ubuntu-latest
    needs: [changes, backend-check, backend-test]
    if: needs.changes.outputs.backend == 'true' && github.event_name == 'push'
    defaults:
      run:
        working-directory: sources/dev/authentication
    steps:
      - uses: actions/checkout@v4

      - name: Docker build (dry run)
        run: docker build -t auth-backend:ci .

  frontend-check:
    name: Frontend Lint & Build
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sources/dev/admin-dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: sources/dev/admin-dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  go-check:
    name: Go Lint
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sources/dev/authentication-go
    steps:
      - uses: actions/checkout@v4

      # The Go module uses a local `replace` for the public `x` library, which
      # lives in a separate repo. Check it out and repoint the replace at it.
      - name: Checkout x dependency
        uses: actions/checkout@v4
        with:
          repository: zhaochy1990/x
          path: _x

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: sources/dev/authentication-go/go.sum

      - name: Point the x replace at the checked-out copy
        run: go mod edit -replace github.com/zhaochy1990/x="$GITHUB_WORKSPACE/_x"

      - name: Check formatting
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"; echo "$unformatted"; exit 1
          fi

      - name: Vet
        run: go vet ./...

  go-test:
    name: Go Test
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sources/dev/authentication-go

    services:
      azurite:
        image: mcr.microsoft.com/azure-storage/azurite
        ports:
          - 10002:10002
        options: >-
          --health-cmd "nc -z 127.0.0.1 10002"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Checkout x dependency
        uses: actions/checkout@v4
        with:
          repository: zhaochy1990/x
          path: _x

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: sources/dev/authentication-go/go.sum

      - name: Point the x replace at the checked-out copy
        run: go mod edit -replace github.com/zhaochy1990/x="$GITHUB_WORKSPACE/_x"

      - name: Generate ephemeral JWT keys
        run: |
          mkdir -p keys
          openssl genpkey -algorithm RSA -out keys/private.pem -pkeyopt rsa_keygen_bits:2048
          openssl rsa -pubout -in keys/private.pem -out keys/public.pem

      - name: Run tests
        env:
          TEST_MYSQL_DSN: "mysql://auth:auth_password@127.0.0.1:3306/auth_test"
        run: go test ./... -count=1

  go-docker:
    name: Go Docker Build
    runs-on: ubuntu-latest
    needs: [changes, go-check, go-test]
    if: needs.changes.outputs.go == 'true' && github.event_name == 'push'
    defaults:
      run:
        working-directory: sources/dev/authentication-go
    steps:
      - uses: actions/checkout@v4

      - name: Checkout x dependency
        uses: actions/checkout@v4
        with:
          repository: zhaochy1990/x
          path: _x

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: sources/dev/authentication-go/go.sum

      # Vendor with the checked-out x so the image builds offline (-mod=vendor).
      - name: Vendor dependencies
        run: |
          go mod edit -replace github.com/zhaochy1990/x="$GITHUB_WORKSPACE/_x"
          go mod vendor

      - name: Docker build (dry run)
        run: docker build -t auth-backend-go:ci .
