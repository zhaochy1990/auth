name: Deploy

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  packages: write

# Serialize production deploys so overlapping runs never mutate the server
# (or Azure) concurrently.
concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/auth-backend
  BACKEND_APP_NAME: auth-backend
  RESOURCE_GROUP: rg-auth-prod

jobs:
  # ---------------------------------------------------------------------------
  # Build the backend image once and push to GHCR. Both the Tencent (primary)
  # and Azure (standby) deploys consume this same image.
  # ---------------------------------------------------------------------------
  build-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    environment: production
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Checkout x dependency
        uses: actions/checkout@v4
        with:
          repository: zhaochy1990/x
          path: _x

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            # Tag push — extract version from tag name (v2026.2.1 → 2026.2.1)
            VERSION="${GITHUB_REF_NAME#v}"
          else
            # Manual dispatch — use commit SHA
            VERSION="${GITHUB_SHA::7}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: sources/dev/authentication-go/go.sum

      - name: Vendor backend dependencies
        working-directory: sources/dev/authentication-go
        run: |
          go mod edit -replace github.com/zhaochy1990/x="$GITHUB_WORKSPACE/_x"
          go mod vendor

      - name: Build and push Docker image
        working-directory: sources/dev/authentication-go
        run: |
          docker build \
            --build-arg APP_VERSION=${{ steps.version.outputs.version }} \
            -t ${{ env.GHCR_IMAGE }}:${{ steps.version.outputs.version }} \
            -t ${{ env.GHCR_IMAGE }}:latest \
            .
          docker push ${{ env.GHCR_IMAGE }}:${{ steps.version.outputs.version }}
          docker push ${{ env.GHCR_IMAGE }}:latest

  # ---------------------------------------------------------------------------
  # PRIMARY: Tencent Cloud Lighthouse. Frontend + backend served same-origin
  # behind Caddy on https://124.221.38.59. Frontend is built with an empty
  # VITE_API_BASE_URL so it calls the API via relative paths on the same origin.
  # ---------------------------------------------------------------------------
  deploy-tencent:
    name: Deploy to Tencent Lighthouse (primary)
    runs-on: ubuntu-latest
    needs: build-push
    environment: production
    # Fail fast instead of hanging for hours if the cross-border link stalls.
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: sources/dev/admin-dashboard/package-lock.json

      - name: Install dependencies
        working-directory: sources/dev/admin-dashboard
        run: npm ci

      - name: Build frontend (same-origin)
        working-directory: sources/dev/admin-dashboard
        env:
          VITE_API_CLIENT_ID: ${{ vars.VITE_API_CLIENT_ID }}
          VITE_API_BASE_URL: ""   # same-origin: served by Caddy alongside the API
          VITE_APP_VERSION: ${{ needs.build-push.outputs.version }}
        run: npm run build

      - name: Setup SSH
        env:
          DEPLOY_KEY: ${{ secrets.TENCENT_SSH_KEY }}
          SSH_HOST: ${{ vars.TENCENT_SSH_HOST }}
          SSH_USER: ${{ vars.TENCENT_SSH_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          # Alias with keepalives so a stalled cross-border TCP connection aborts
          # (ServerAlive*) instead of hanging forever, plus a connect timeout.
          cat > ~/.ssh/config <<EOF
          Host tencent
            HostName $SSH_HOST
            User $SSH_USER
            IdentityFile ~/.ssh/id_deploy
            StrictHostKeyChecking accept-new
            ConnectTimeout 30
            ServerAliveInterval 15
            ServerAliveCountMax 4
            TCPKeepAlive yes
          EOF
          chmod 600 ~/.ssh/config
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Sync deploy files + frontend build
        run: |
          set -euo pipefail
          for n in 1 2 3; do
            if rsync -az --timeout=120 -e ssh \
                 deploy/tencent/docker-compose.yml \
                 deploy/tencent/Caddyfile \
                 deploy/tencent/remote-deploy.sh \
                 tencent:~/auth/ \
               && rsync -az --delete --timeout=120 -e ssh \
                 sources/dev/admin-dashboard/dist/ \
                 tencent:~/auth/www/; then
              echo "sync ok"; break
            fi
            echo "sync attempt $n failed"; [ "$n" = 3 ] && exit 1; sleep 10
          done

      - name: Transfer backend image to server (GHCR → docker load over SSH)
        env:
          VERSION: ${{ needs.build-push.outputs.version }}
        run: |
          set -euo pipefail
          # Runner pulls from GHCR (fast, outside China) and streams the image to
          # the server over SSH; the mainland-China server cannot reliably pull
          # from GHCR's CDN directly (TLS handshake timeouts).
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker pull "$GHCR_IMAGE:$VERSION"
          docker save "$GHCR_IMAGE:$VERSION" | gzip > /tmp/auth-image.tgz
          echo "image size: $(du -h /tmp/auth-image.tgz | cut -f1)"
          for n in 1 2 3; do
            if ssh tencent 'gunzip | docker load' < /tmp/auth-image.tgz; then
              echo "image load ok"; break
            fi
            echo "image transfer attempt $n failed"; [ "$n" = 3 ] && exit 1; sleep 10
          done

      - name: Deploy + health check on server
        env:
          VERSION: ${{ needs.build-push.outputs.version }}
        run: |
          ssh tencent "bash ~/auth/remote-deploy.sh '$VERSION'"

  # ---------------------------------------------------------------------------
  # STANDBY (rollback): Azure Container Apps backend. Kept warm so we can fall
  # back by pointing users at the Azure Static Web App URL.
  # ---------------------------------------------------------------------------
  deploy-azure-backend:
    name: Deploy Backend (Azure, standby)
    runs-on: ubuntu-latest
    needs: build-push
    environment: production
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Configure backend storage secrets
        env:
          MYSQL_DSN: ${{ secrets.MYSQL_DSN }}
          MYSQL_TLS_CA_PEM: ${{ secrets.MYSQL_TLS_CA_PEM }}
        run: |
          if [ -z "$MYSQL_DSN" ]; then
            echo "::error::production secret MYSQL_DSN is required for the MySQL backend"
            exit 1
          fi
          az containerapp secret set \
            --name ${{ env.BACKEND_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --secrets mysql-dsn="$MYSQL_DSN"
          if [ -n "$MYSQL_TLS_CA_PEM" ]; then
            az containerapp secret set \
              --name ${{ env.BACKEND_APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --secrets mysql-tls-ca-pem="$MYSQL_TLS_CA_PEM"
          fi

      - name: Deploy to Container Apps
        run: |
          env_vars=(STORAGE_BACKEND=mysql MYSQL_DSN=secretref:mysql-dsn)
          if az containerapp secret show \
            --name ${{ env.BACKEND_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --secret-name mysql-tls-ca-pem >/dev/null 2>&1; then
            env_vars+=(MYSQL_TLS_CA_PEM=secretref:mysql-tls-ca-pem)
          fi
          az containerapp update \
            --name ${{ env.BACKEND_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.GHCR_IMAGE }}:${{ needs.build-push.outputs.version }} \
            --set-env-vars "${env_vars[@]}"

      - name: Health check
        run: |
          FQDN=$(az containerapp show \
            --name ${{ env.BACKEND_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "Backend FQDN: $FQDN"
          for i in $(seq 1 30); do
            if curl -sf "https://$FQDN/health" | grep -q '"status":"ok"'; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i/30 - waiting 10s..."
            sleep 10
          done
          echo "Health check failed after 5 minutes"
          exit 1

  deploy-azure-frontend:
    name: Deploy Frontend (Azure SWA, standby)
    runs-on: ubuntu-latest
    needs: [build-push, deploy-azure-backend]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: sources/dev/admin-dashboard/package-lock.json

      - name: Install dependencies
        working-directory: sources/dev/admin-dashboard
        run: npm ci

      - name: Build frontend
        working-directory: sources/dev/admin-dashboard
        env:
          VITE_API_CLIENT_ID: ${{ vars.VITE_API_CLIENT_ID }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_APP_VERSION: ${{ needs.build-push.outputs.version }}
        run: npm run build

      - name: Deploy to Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOY_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: sources/dev/admin-dashboard/dist
          skip_app_build: true
          skip_api_build: true
