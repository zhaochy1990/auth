services:
  mysql:
    image: mysql:8.4
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: auth
      MYSQL_USER: auth
      MYSQL_PASSWORD: auth_password
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uauth", "-pauth_password"]
      interval: 5s
      timeout: 3s
      retries: 20

  auth:
    build: .
    ports:
      - "3001:3000"
    volumes:
      - ./keys:/app/keys:ro
    environment:
      STORAGE_BACKEND: "mysql"
      MYSQL_DSN: "mysql://auth:auth_password@mysql:3306/auth"
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "3000"
      JWT_PRIVATE_KEY_PATH: "./keys/private.pem"
      JWT_PUBLIC_KEY_PATH: "./keys/public.pem"
      CORS_ALLOWED_ORIGINS: "http://localhost:5173"
      LOG_LEVEL: "debug"
      LOG_FORMAT: "json"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql-data:
